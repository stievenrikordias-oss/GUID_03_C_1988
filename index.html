<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Ubah Warna</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box">

<h2>Website Ubah Warna</h2>

<br>

<label>Pilih warna teks:</label>
<input type="color" id="textColor">

<br><br>

<div class="file-row">
<label>Pilih gambar:</label>
<input type="file" id="filebg" accept="image/*">
</div>

</div>

<script>

const textColor = document.getElementById("textColor");

textColor.addEventListener("input", function(){
document.body.style.color = textColor.value;
});

const filebg = document.getElementById("filebg");

filebg.addEventListener("change", function(event){

const file = event.target.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

document.body.style.backgroundImage = `url(${e.target.result})`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundPosition = "center";
document.body.style.backgroundRepeat = "no-repeat";

};

reader.readAsDataURL(file);

}

});

</script>

</body>
</html>
